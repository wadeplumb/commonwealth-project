permissions:
  contents: write
name: Convert Markdown to HTML

on:
  push:
    branches:
      - main # or your default branch
    paths-ignore:
      - "html/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Convert Markdown to HTML
        run: |
          mkdir -p html
          for file in pagesmd/*.md; do
            base=$(basename "$file" .md)
            pandoc "$file" -s --css ../styles.css -o "html/$base.html"



          done

      - name: add containers to html files
        run: |
          for file in html/*.html; do
            sed -i 's|</header>|</header>\n  <div class="container">|; s|</body>|  </div>\n</body>|' "$file"
            sed -i 's|<header id="title-block-header">|<header id="title-block-header">\n  <div class="nav-bar-container">|; s|</header>|  </div>\n</header>|' "$file"
            sed -i '/<\/head>/i \  <script src="../navbar.js" defer></script>' "$file"
          done

      - name: Remove HTML files without matching Markdown
        run: |
          for htmlfile in html/*.html; do
            base=$(basename "$htmlfile" .html)
            if [ ! -f "pagesmd/$base.md" ]; then
              echo "Removing orphaned HTML: $htmlfile"
              rm "$htmlfile"
            fi
          done

      - name: Commit HTML back to repo
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add html/
          git commit -m "Auto-generate HTML from Markdown" || echo "No changes to commit"
          git push
