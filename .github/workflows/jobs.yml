permissions:
  contents: write
name: Convert Markdown to HTML

on:
  push:
    branches:
      - main # or your default branch
    paths-ignore:
      - "html/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Convert Markdown to HTML (safe filename handling)
        run: |
          mkdir -p html
          > generated.txt

          for file in pagesmd/*.md; do
            # Extract description
            desc=$(grep -m 1 '^description:' "$file" | cut -d':' -f2- | xargs)

            # Fallback if missing
            if [ -z "$desc" ]; then
              base=$(basename "$file" .md)
            else
              base=$(echo "$desc" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/-\+/-/g' | sed 's/^-//;s/-$//')
            fi

            output="html/$base.html"

            echo "Generating $output"
            pandoc "$file" -s --css ../styles.css -o "$output"

            echo "$output" >> generated.txt
          done

      - name: add containers to html files
        run: |
          for file in html/*.html; do
            sed -i 's|</header>|</header>\n  <div class="container">|; s|</body>|  </div>\n</body>|' "$file"
            sed -i 's|<header id="title-block-header">|<header id="title-block-header">\n  <div class="nav-bar-container">|; s|</header>|  </div>\n</header>|' "$file"
            sed -i '/<\/head>/i \  <script src="../navbar.js" defer></script>' "$file"
            sed -i '/<\/head>/i \  <link rel="icon" href="../images/Lighthouse favicon.png" type="image/png" />' "$file"
            sed -i '/<\/head>/i \  <meta name="viewport" content="width=device-width, initial-scale=1">' "$file"
          done

      - name: Remove orphaned HTML files (safe)
        run: |
          for file in html/*.html; do
            if ! grep -qx "$file" generated.txt; then
              echo "Removing old file: $file"
              rm "$file"
            fi
          done

      - name: Commit HTML back to repo
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add html/
          git commit -m "Auto-generate HTML from Markdown" || echo "No changes to commit"
          git push
